<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garfield Chat Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fff8e1; /* Creamy yellow background */
            overflow: hidden; /* Prevent scroll on mobile for app-like feel */
        }

        /* Custom scrollbar for chat history */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animation Keyframes */
        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0px); }
            50% { transform: scale(1.02) translateY(-3px); }
        }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        @keyframes talk {
            0%, 100% { transform: translate(-50%, 0) scaleY(1); }
            50% { transform: translate(-50%, 0) scaleY(0.8); }
        }

        @keyframes tail-sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg) translateY(0px); }
            25% { transform: rotate(-15deg) translateY(-10px); }
            50% { transform: rotate(15deg) translateY(-5px); }
            75% { transform: rotate(-10deg) translateY(-8px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); opacity: 0.6; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        @keyframes excited {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.15) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-3deg); }
        }

        @keyframes head-tilt {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-8deg); }
        }

        @keyframes scratch {
            0%, 100% { transform: translateX(0px); }
            25% { transform: translateX(3px); }
            50% { transform: translateX(-3px); }
            75% { transform: translateX(2px); }
        }

        @keyframes fish-fall {
            0% { 
                transform: translateY(-100px) rotate(0deg); 
                opacity: 1; 
            }
            50% {
                transform: translateY(calc(50vh)) rotate(180deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(calc(100vh + 50px)) rotate(360deg); 
                opacity: 0; 
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            10% { transform: translateX(-8px) rotate(-2deg); }
            20% { transform: translateX(8px) rotate(2deg); }
            30% { transform: translateX(-8px) rotate(-2deg); }
            40% { transform: translateX(8px) rotate(2deg); }
            50% { transform: translateX(-8px) rotate(-2deg); }
            60% { transform: translateX(8px) rotate(2deg); }
            70% { transform: translateX(-8px) rotate(-2deg); }
            80% { transform: translateX(8px) rotate(2deg); }
            90% { transform: translateX(-4px) rotate(-1deg); }
        }

        /* Classes for animations */
        .animate-breathe { animation: breathe 4s ease-in-out infinite; }
        .animate-talk { animation: talk 0.2s infinite; }
        .animate-bounce-subtle { animation: bounce-subtle 0.5s ease-in-out infinite; }
        .animate-tail-sway { animation: tail-sway 3s ease-in-out infinite; }
        .animate-wave { animation: wave 0.6s ease-in-out 3; }
        .animate-float { animation: float 2s ease-in-out infinite; }
        .animate-excited { animation: excited 0.6s ease-in-out; }
        .animate-head-tilt { animation: head-tilt 1.5s ease-in-out infinite; }
        .animate-scratch { animation: scratch 0.3s ease-in-out infinite; }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        .animate-fish-fall { animation: fish-fall 2s ease-in forwards; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }

        .cat-shadow {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
